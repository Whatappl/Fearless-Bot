<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fearless Panel 1.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 380px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Title styling with glowing effect */
        .title-brand {
            color: #ffffff;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 46, 115, 0.5);
            margin-bottom: 5px;
        }

        .title-brand span {
            color: #ff2e73; /* Pink accent */
        }

        .subtitle {
            color: #555555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        /* Card Container */
        .card {
            background-color: #0b0b0c;
            border: 1px solid #1a1a1c;
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        .card-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Form styling */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-label {
            color: #555555;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            background-color: #050505;
            border: 1.5px solid #1f1f22;
            border-radius: 14px;
            padding: 16px;
            color: #ffffff;
            font-size: 15px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .input-field:focus {
            border-color: #ff2e73;
            box-shadow: 0 0 12px rgba(255, 46, 115, 0.2);
            background-color: #08080a;
        }

        .input-field:disabled {
            background-color: #0d0d0f;
            border-color: #151517;
            color: #444;
            cursor: not-allowed;
            placeholder-color: #333;
        }

        /* Button styling */
        .btn-submit, .btn-action {
            width: 100%;
            background: #ff2e73;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(255, 46, 115, 0.3);
        }

        .btn-submit:active, .btn-action:active {
            transform: scale(0.97);
            background: #e02461;
            box-shadow: 0 3px 10px rgba(255, 46, 115, 0.2);
        }

        .btn-action {
            background: #25d366; /* WhatsApp Green */
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
            margin-bottom: 15px;
        }
        .btn-action:active {
            background: #1da851;
            box-shadow: 0 3px 10px rgba(37, 211, 102, 0.2);
        }

        /* Error/Status messages */
        .status-msg {
            font-size: 12px;
            margin-top: 15px;
            height: auto;
            font-weight: 600;
            transition: all 0.3s ease;
            line-height: 1.4;
        }

        .error {
            color: #ff3b30;
        }

        .success {
            color: #4cd964;
        }
        
        .info {
            color: #00bcd4;
        }

        /* Shaking animation for wrong key entry */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ff3b30 !important;
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.2) !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Header -->
        <h1 class="title-brand">FEARLESS <span>PANEL 1.0</span></h1>
        <p class="subtitle">SISTEMA DE CONTROLE</p>

        <!-- Login Card -->
        <div class="card">
            <h2 class="card-title" id="cardTitle">Acesse sua conta</h2>

            <!-- Step 1: Force Join Channel Button -->
            <button type="button" id="btnChannel" class="btn-action" onclick="joinChannel()">ENTRAR NO CANAL DO WHATSAPP</button>

            <div class="input-group">
                <label class="input-label" for="accessKey">Chave de Acesso</label>
                <!-- Disabled by default until they click join -->
                <input type="text" id="accessKey" class="input-field" placeholder="Insira seu código..." autocomplete="off" disabled>
            </div>

            <!-- Main control button -->
            <button type="button" id="btnMain" class="btn-submit" onclick="verifyKey()">ENTRAR</button>

            <!-- Error/Status output -->
            <div id="statusBox" class="status-msg info">Por favor, entre no nosso canal primeiro para liberar a digitação!</div>
        </div>
    </div>

    <script>
        // System variables tracking user progress
        let joinedChannel = false;
        let isKeyVerified = false;
        let shareCount = 0;
        
        // Direct mobile/universal WhatsApp URL schemas
        const channelUrl = "https://whatsapp.com/channel/0029VbDIkfX3GJOotlw08M3E";
        const masterKey = "FEARLESS-PROXYV1";
        
        // Formatted Text to be shared with contacts/groups
        const shareText = `*FREE AIMBOT FOR MAIN ID🍃👇*_\n(APK + SETUP)_\n\n*🔗GET AIM BOT APK :* ${channelUrl}\n\n*🔗Update Channel :* ${channelUrl}\n\n💬 Share with 5 groups or with your friends so you don't get errors when entering ☑️`;

        // STEP 1: Direct user directly to WhatsApp channel
        function joinChannel() {
            // Using blank window targets the WhatsApp client immediately on devices
            window.open(channelUrl, '_blank');
            joinedChannel = true;
            
            // UI updates
            document.getElementById('accessKey').disabled = false;
            document.getElementById('btnChannel').style.display = 'none'; // Hide join button
            document.getElementById('statusBox').className = "status-msg success";
            document.getElementById('statusBox').innerHTML = "Canal acessado! Agora você pode digitar sua chave.";
        }

        // Main action handler (Combines key check and sharing logic)
        function verifyKey() {
            const statusBox = document.getElementById('statusBox');
            const inputField = document.getElementById('accessKey');
            const enteredKey = inputField.value.trim();
            const mainButton = document.getElementById('btnMain');

            // Standard safety check if they bypassed disabled tags manually
            if (!joinedChannel) {
                inputField.classList.add('shake');
                statusBox.className = "status-msg error";
                statusBox.innerHTML = "Você precisa entrar no canal primeiro!";
                return;
            }

            // PHASE A: Verify Key Input
            if (!isKeyVerified) {
                statusBox.className = "status-msg";
                statusBox.innerHTML = "";
                inputField.classList.remove('shake');

                if (enteredKey === "") {
                    inputField.classList.add('shake');
                    statusBox.classList.add('error');
                    statusBox.innerHTML = "Por favor, insira uma chave!";
                    return;
                }

                if (enteredKey === masterKey) {
                    isKeyVerified = true;
                    // Transition interface into sharing mode
                    inputField.disabled = true;
                    document.getElementById('cardTitle').innerHTML = "Compartilhamento Obrigatório";
                    mainButton.innerHTML = "COMPARTILHAR EM GRUPOS (0/5)";
                    mainButton.style.backgroundColor = "#25d366"; // Switch to green theme
                    statusBox.className = "status-msg info";
                    statusBox.innerHTML = "Chave válida! Compartilhe o script em 5 grupos de WhatsApp para liberar o painel.";
                } else {
                    inputField.classList.add('shake');
                    statusBox.classList.add('error');
                    statusBox.innerHTML = "Chave incorreta ou expirada!";
                }
                return;
            }

            // PHASE B: Direct user to WhatsApp to select contacts/groups & share
            if (isKeyVerified && shareCount < 5) {
                // Using wa.me/send forces native contact picker instead of API middleman page
                const whatsappIntent = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
                window.open(whatsappIntent, '_blank');
                
                shareCount++;
                mainButton.innerHTML = `COMPARTILHAR EM GRUPOS (${shareCount}/5)`;
                
                if(shareCount < 5) {
                    statusBox.className = "status-msg info";
                    statusBox.innerHTML = `Compartilhado ${shareCount}/5 vezes. Continue compartilhando até atingir 5 grupos!`;
                } else {
                    // Maximum requirements met
                    mainButton.innerHTML = "ACESSAR PAINEL";
                    mainButton.style.backgroundColor = "#4cd964";
                    statusBox.className = "status-msg success";
                    statusBox.innerHTML = "Verificação completa! Clique no botão acima para entrar.";
                }
                return;
            }

            // PHASE C: Finished requirements, execute success landing
            if (isKeyVerified && shareCount >= 5) {
                statusBox.className = "status-msg success";
                statusBox.innerHTML = "Acesso Permitido! Carregando...";
                
                setTimeout(() => {
                    alert("Bem-vindo ao Fearless Panel!");
                    // To link your assets panel dashboard page, uncomment below line:
                    // window.location.href = "dashboard.html";
                }, 500);
            }
        }
    </script>
</body>
</html>
